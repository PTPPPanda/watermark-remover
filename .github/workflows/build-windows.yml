name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy tkinterdnd2 pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --noconsole --collect-all numpy --collect-all PIL --hidden-import=numpy --hidden-import=PIL --name WatermarkRemover watermark_remover.py

      - name: Verify build
        run: |
          ls -la dist/
          python -c "import os; print('EXE size:', os.path.getsize('dist/WatermarkRemover.exe'), 'bytes')"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatermarkRemover-Windows
          path: dist/WatermarkRemover.exe
          if-no-files-found: error
